# All tunables for duptool live in this file. Changing a value must never
# require touching Python code.
#
# Validated against duptool/models.py::Settings. Unknown or misspelled keys
# are REJECTED at load time (catches typos before they silently do nothing).
config_version: 2

ingest:
  # ADO CSV exports are typically UTF-8 with a BOM; utf-8-sig handles both
  # plain UTF-8 and BOM-prefixed files.
  encoding: utf-8-sig
  # Map duptool's ticket fields to the CSV's column headers. Exports change;
  # when the column names change, fix them here, not in code.
  # Real export columns (owner, 2026-07-19): ID, State, Work Item Type,
  # Title1, Title 2, Tags, Repro Steps, Description. "Tags" and
  # "Work Item Type" are not used yet -- when needed, they get their own
  # mapping entries here plus an owner-approved signal.
  # Real export header (2026-07-19): ID, Work Item Type, Title 1, Title 2,
  # State, Tags, Related Item, Description, Repro Steps, Parent or Child.
  # "Parent or Child" stays unmapped until a filled cell shows its format;
  # hierarchy is derived from the title columns' row order meanwhile.
  columns:
    id: "ID"
    # first non-empty wins; the ORDER is the tree level ("Title 1" = User
    # Story / parent row, "Title 2" = its child tasks below it)
    title: ["Title 1", "Title 2"]
    # all non-empty are concatenated: Repro Steps often carries the BDD
    # steps -- prime extraction material
    description: ["Description", "Repro Steps"]
    state: "State"
    # linked work item IDs (ADO Related Work). Empty cells are fine --
    # suppression fires only when IDs appear here.
    links: "Related Item"
  # Skip tickets in these states (reported, never silent). Empty = keep all.
  # Consider ["Closed", "Removed"] once confirmed against a real export.
  exclude_states: []
  # Derive parent-child relations from the tree export's title columns
  # (row order: a level-1 row is the parent of the level-2 rows below it).
  hierarchy_from_title_columns: true

candidates:
  # Pairs the tester already knows about are not suggestions (owner,
  # 2026-07-19): a User Story and its child task often share near-identical
  # titles -- parent-child, NOT duplicates. Suppressed counts are printed.
  suppress_parent_child: true
  suppress_already_linked: true

signals:
  # --- Tracker item references (the highest-value signal) -------------------
  # The tracker assigns ONE global number per item; TMS and TRQ share the id
  # space and links all look like https://.../cb/issue/{number}. Matching is
  # therefore by NUMBER; the kind (tms/trq) is evidence metadata. Patterns
  # validated against 10 real tickets on 2026-07-15.
  ids:
    kinds:
      tms:
        text_patterns:
          # TMS-48213, TMS 48213, tms48213, TMS_48213, tms:48213, TMS - 48213
          # and labeled forms: "TMS ID: 6627195", "TMS ID List: 6996741"
          - '(?i)\btms(?:[\s\-_:#\.]+(?:ids?|list)\b)*[\s\-_:#\.]*(\d{1,8})\b'
        url_patterns:
          # URLs that name the kind themselves (rare; most links are shared shape)
          - '(?i)tms[^\s<>]*[/=](\d{1,8})\b'
        section_labels:
          - "affected tms ids"
          - "affected tms id"
          - "affected tms"
          - "tms id list"
          - "tms ids list"
          - "tms list"
          - "tms ids"
          - "tms id"
          - "tms"
      trq:
        text_patterns:
          - '(?i)\btrq(?:[\s\-_:#\.]+(?:ids?|list)\b)*[\s\-_:#\.]*(\d{1,8})\b'
        url_patterns:
          - '(?i)trq[^\s<>]*[/=](\d{1,8})\b'
        section_labels:
          - "affected trqs"
          - "affected trq ids"
          - "affected trq"
          - "trq id list"
          - "trq ids list"
          - "trq list"
          - "trq ids"
          - "trqs"
          - "trq"

    # 99% of pasted links look like https://.../cb/issue/{number} regardless
    # of kind. Inside a TMS/TRQ section the section supplies the kind;
    # anywhere else the ref is kept with kind "unknown" (still matchable).
    shared_url_patterns:
      - '(?i)/cb/issue/(\d{1,8})\b'

    # Inside an ID section, lines that START with a number or a table pipe
    # are ID rows ("1312312 | covered | ..."); harvest their standalone
    # numbers. Prose lines inside sections are never harvested, so
    # "verify version 0.36" can't produce a false ID.
    section_number_pattern: '\b(\d{5,8})\b'

    # Unlabeled ID dumps anywhere ("days: 1325121 4353414 8532578"): nearly
    # all real TMS/TRQ numbers are 7 digits, so a line containing 2+
    # standalone 7-digit numbers is treated as an ID list (kind unknown).
    # A single bare number is never extracted.
    unlabeled_run_pattern: '\b(\d{7})\b'
    unlabeled_run_min_count: 2

    # A section line starting with one of these words refers to something
    # else ("bug: https://.../cb/issue/123" inside the TRQs section) -- its
    # refs are kept but with kind "unknown".
    neutral_line_labels:
      - "bug"
      - "issue"
      - "defect"
      - "note"
      - "see"
      - "investigation"

  # --- Template section labels ----------------------------------------------
  # Matched case-insensitively, tolerant of punctuation/markdown around the
  # words. ID section labels live under ids.kinds.<kind>.section_labels.
  template_labels:
    what_needs_to_be_done:
      - "what needs to be done"
      - "what should be done"
    affected_layer_method:
      - "affected layer and method"
      - "affected layers and methods"
      - "affected layer method"

  # --- Task-type classification ----------------------------------------------
  # Route 1: an explicit header at the START of the title ("[Refactor] fix
  # login", "(Investigation) menu") -- strongest signal when present.
  # Route 2: lowercase substring vote on title + body; only an unambiguous
  # vote (exactly one type hits) classifies. Otherwise -> "unknown".
  # NOTE: task types are soft context, never separators -- an Investigation
  # ticket can still duplicate a Refactor ticket. Scoring must treat type
  # as weak evidence only.
  task_type:
    title_headers:
      implementation:
        - "implementation"
        - "impl"
      refactor:
        - "refactor"
        - "refactoring"
      investigation:
        - "investigation"
        - "investigate"
        - "analysis"
    keywords:
      implementation:
        - "implement"
        - "add step"
        - "add test"
        - "new test"
        - "create test"
        - "create new"
        - "add coverage"
        - "extend the step"
        - "enhance step"
      refactor:
        - "refactor"
        - "update"
        - "rework"
        - "modify"
        - "adjust"
        - "rename"
        - "fix test"
        - "obsolete"
        - "remove extra steps"
      investigation:
        - "investigate"
        - "investigation"
        - "check if"
        - "check whether"
        - "look into"
        - "find out"
        - "analyse"
        - "analyze"
        - "still needed"
        - "still need"

  # --- Mentioned test steps ----------------------------------------------------
  # "step 3", "Step #12", "test step 4"
  step_patterns:
    - '(?i)\b(?:test\s+)?steps?\s*[#:]?\s*(\d{1,4})\b'

scoring:
  # Relative signal weights. They need not sum to 1: for every pair the
  # final score renormalizes over the signals that actually fired, so a
  # skipped signal (missing data) never punishes a pair.
  # Owner feedback (2026-07-19): the golden signals are structural --
  # shared items, shared methods/identifiers, shared BDD steps. Text
  # similarity is support only (blank/copy-pasted templates make it lie).
  weights:
    id_overlap: 0.45     # dominant on purpose -- shared items are THE signal
    layer_method: 0.20   # methods/quoted tokens/BDD steps -- golden
    task_type: 0.05      # soft context only (owner rule), lowest weight
    steps: 0.10
    lexical: 0.15        # supporting evidence only, see require_structural_evidence

  id_overlap:
    # any shared item starts here; the remaining 0.4 scales with the
    # overlap ratio so identical ref sets reach 1.0
    base: 0.6

  task_type:
    same_type: 1.0
    cross_type: 0.35     # partial credit, never 0 -- types are not separators

  layer_method:
    # per-pool credit: exact identifier match > quoted-token > BDD step text
    method_weight: 1.0
    quoted_weight: 0.9
    bdd_weight: 0.7

  lexical:
    # hand-rolled Okapi BM25 over title + body text
    k1: 1.2              # term-frequency saturation
    b: 0.75              # document-length normalization
    # bodies with fewer words than this cannot judge similarity: blank or
    # template-skeleton tickets otherwise match each other at 1.00
    min_tokens: 15

  # Text similarity and task type are SUPPORTING evidence only. A pair is
  # surfaced only when a structural signal agrees: shared items, shared
  # methods/quoted tokens, or shared steps. (Owner feedback 2026-07-19:
  # blank and copy-pasted template tickets make pure-text matches
  # meaningless.) The shared-item hard rule is unaffected.
  require_structural_evidence: true

  # Classification bands on the final blended score. Deliberately high
  # defaults (precision over recall). Tune ONLY against labelled pairs via
  # `duptool eval`, never by feel. The shared-item hard rule surfaces a
  # pair as at least possibly_related regardless of these thresholds.
  bands:
    possible_duplicate: 0.80
    possibly_related: 0.55

report:
  # Per-ticket summary shows at most this many candidates. Few, strong,
  # well-explained suggestions beat many weak ones -- user trust is fragile.
  top_k_per_ticket: 5
